name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute SSH Commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🚀 Starting Deployment on VPS..."
            cd /opt/Brud-AI || exit 1
            
            PREV_COMMIT=$(git rev-parse HEAD)
            echo "📦 Fetching latest code from GitHub..."
            git fetch origin
            git reset --hard origin/main
            
            # Ensure .env.production exists (create a dummy one if it doesn't to avoid errors)
            if [ ! -f .env.production ]; then
              echo "⚠️ .env.production not found! Creating a placeholder..."
              cp .env.example .env.production
            fi
            
            echo "🏗️ Building Docker Images..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build
            
            echo "🔄 Restarting Containers..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            
            echo "⏳ Waiting for services to start..."
            sleep 10
            
            echo "🩺 Running Health Check..."
            if curl -sS -m 5 http://localhost:8000/health | grep -q '"status":"ok"'; then
                echo "✅ Deployment Successful and Healthy!"
                echo "🧹 Cleaning up old images..."
                docker image prune -f
            else
                echo "❌ Health check failed! Initiating rollback..."
                docker compose -f docker-compose.yml -f docker-compose.prod.yml down
                git reset --hard $PREV_COMMIT
                docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
                echo "🔄 Rollback complete. Previous version restored."
                exit 1
            fi
