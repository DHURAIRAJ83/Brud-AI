version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rudran_backend
    volumes:
      - rudran_data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/tools/plugins:/app/tools/plugins
      - ./backend/models:/app/models
      - hf_cache:/root/.cache/huggingface
      - whisper_cache:/root/.cache/huggingface/hub
    env_file:
      - .env.local
    environment:
      - AGENT_DB_PATH=/app/data/agent.db
      - MEMORY_DB_PATH=/app/data/memory.db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - rudran_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rudran_frontend
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - rudran_network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: rudran_dashboard
    depends_on:
      - backend
    env_file:
      - .env.local
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - rudran_network

  nginx:
    image: nginx:alpine
    container_name: rudran_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/nginx.conf.template:ro
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
      - DOMAIN_NAME=${DOMAIN_NAME:-_}
      - BACKEND_INTERNAL_PORT=${BACKEND_INTERNAL_PORT:-8000}
      - FRONTEND_INTERNAL_PORT=${FRONTEND_INTERNAL_PORT:-3000}
      - DASHBOARD_INTERNAL_PORT=${DASHBOARD_INTERNAL_PORT:-3001}
    depends_on:
      - frontend
      - backend
      - dashboard
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - rudran_network

networks:
  rudran_network:
    driver: bridge

volumes:
  hf_cache:
  whisper_cache:
  rudran_data:
