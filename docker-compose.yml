version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rudran_backend
    volumes:
      - rudran_data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/tools/plugins:/app/tools/plugins
      - ./backend/models:/app/models
      - hf_cache:/root/.cache/huggingface
      - whisper_cache:/root/.cache/huggingface/hub
    env_file:
      - .env.local
    environment:
      - AGENT_DB_PATH=/app/data/agent.db
      - MEMORY_DB_PATH=/app/data/memory.db
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - rudran_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rudran_frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rudran_network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: rudran_dashboard
    depends_on:
      - backend
    env_file:
      - .env.local
    restart: unless-stopped
    networks:
      - rudran_network

  nginx:
    image: nginx:alpine
    container_name: rudran_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - dashboard
    restart: unless-stopped
    networks:
      - rudran_network

networks:
  rudran_network:
    driver: bridge

volumes:
  hf_cache:
  whisper_cache:
  rudran_data:
